                properties:
                  bufferPercentage:
                    default: 20
                    description: Safety buffer added to memory recommendations.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  ignoreOomEvent:
                    default: false
                    description: Whether out-of-memory (OOM) events are ignored.
                    type: boolean
                  minimumImpactPercentage:
                    default: 10
                    description: Minimum percentage change required for a memory scale
