                    maximum: 100
                    minimum: 0
                    type: integer
                  minimumStepForScaleUp:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 100m
                    description: Minimum CPU increment for scale-up actions.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  minimumValueForScaleDown:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 10m
                    description: Minimum allowed CPU value after scale-down.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  optimizationStrategy:
                    default: p95
                    description: Over-time aggregation strategy for CPU recommendations
                      ("p85", "p95", "max").
                    enum:
                    - p85
                    - p95
                    - max
                    type: string
                  replicaAggregationMethod:
                    default: max
                    description: Per-sample aggregation strategy for CPU recommendations
                      ("p85", "p95", "max", "custom1", "custom2").
                    enum:
                    - p85
                    - p95
                    - max
                    - custom1
                    - custom2
                    type: string
                required:
                - bufferPercentage
                - ignoreThrottlingEvent
                - minimumImpactPercentage
                - minimumStepForScaleUp
                - minimumValueForScaleDown
                - optimizationStrategy
                - replicaAggregationMethod
                type: object
              dataCoveragePercentage:
                default: 70
                description: Minimum percentage of the lookback window that must contain
                  data.
                maximum: 100
                minimum: 0
                type: integer
              description:
                description: Human-readable description of the policy.
                type: string
              evictPodsInDeferredState:
                default: false
                description: Whether to evict pods in deferred state when actions
