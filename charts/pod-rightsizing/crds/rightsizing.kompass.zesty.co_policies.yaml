                    maximum: 100
                    minimum: 0
                    type: integer
                  minimumStepForScaleUp:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 100Mi
                    description: Minimum memory increment for scale-up actions.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  minimumValueForScaleDown:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 10Mi
                    description: Minimum allowed memory value after scale-down.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  optimizationStrategy:
                    default: p95
                    description: Over-time aggregation strategy for memory recommendations
                      ("p95", "p99", "max").
                    enum:
                    - p95
                    - p99
                    - max
                    type: string
                  replicaAggregationMethod:
                    default: max
                    description: Per-sample aggregation strategy for memory recommendations
                      ("p95", "p99", "max", "custom1", "custom2").
                    enum:
                    - p95
                    - p99
                    - max
                    - custom1
                    - custom2
                    type: string
                required:
                - bufferPercentage
                - ignoreOomEvent
                - minimumImpactPercentage
                - minimumStepForScaleUp
                - minimumValueForScaleDown
                - optimizationStrategy
                - replicaAggregationMethod
                type: object
              preferInPlace:
                description: |-
                  Whether to prefer in-place execution for actions created by this policy.
                  Supported only in kubernetes 1.33+
                type: boolean
              priority:
                description: Policy precedence when multiple policies match the same
