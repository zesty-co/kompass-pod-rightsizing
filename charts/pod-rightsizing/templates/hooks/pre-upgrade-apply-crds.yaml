---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pre-upgrade-apply-crds
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-50"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-pre-upgrade-apply-crds
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-50"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "create", "update", "patch", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-pre-upgrade-apply-crds
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-50"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-pre-upgrade-apply-crds
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-pre-upgrade-apply-crds
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-pre-upgrade-apply-crds
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-40"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pre-upgrade-apply-crds
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-pre-upgrade-apply-crds
      restartPolicy: Never

      {{- if .Values.global.nodeSelector }}
      nodeSelector:
{{- toYaml .Values.global.nodeSelector | nindent 8 }}
      {{- end }}

      {{- if .Values.global.tolerations }}
      tolerations:
{{- toYaml .Values.global.tolerations | nindent 8 }}
      {{- end }}

      volumes:
        - name: crds-volume
          configMap:
            name: {{ .Release.Name }}-pre-upgrade-crds

      containers:
        - name: kubectl
          image: {{ .Values.hooks.image.registry }}/{{ .Values.hooks.image.repository }}:{{ .Values.hooks.image.tag }}
          imagePullPolicy: IfNotPresent

          volumeMounts:
            - name: crds-volume
              mountPath: /mnt/crds

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              CONFIGMAP_NAME="{{ .Release.Name }}-pre-upgrade-crds"
              NAMESPACE="{{ .Release.Namespace }}"

              echo "[DEBUG] Release Name: {{ .Release.Name }}"
              echo "[DEBUG] Release Namespace: {{ .Release.Namespace }}"
              echo "[DEBUG] ConfigMap Name: $CONFIGMAP_NAME"
              echo "[DEBUG] Namespace: $NAMESPACE"

              echo "[INFO] Waiting for ConfigMap $CONFIGMAP_NAME..."

              for i in {1..120}; do
                echo "[DEBUG] Attempt $i: Checking for ConfigMap $CONFIGMAP_NAME in namespace $NAMESPACE"
                kubectl get configmaps -n "$NAMESPACE" | grep "$CONFIGMAP_NAME" && echo "[INFO] ConfigMap found in list." && break
                if [ "$i" -eq 120 ]; then
                  echo "[ERROR] ConfigMap $CONFIGMAP_NAME not found after 120 seconds."
                  echo "[DEBUG] Listing all configmaps in namespace $NAMESPACE:"
                  kubectl get configmaps -n "$NAMESPACE"
                  exit 1
                fi
                sleep 1
              done

              echo "[INFO] Applying CRDs (server-side apply)..."

              echo "[DEBUG] Files in /mnt/crds:"
              ls -la /mnt/crds

              retries=6
              delay=5
              for i in $(seq 1 $retries); do
                if kubectl apply \
                  --server-side \
                  --force-conflicts \
                  --field-manager=helm-pre-upgrade-crd-hook \
                  -f /mnt/crds/ ; then
                  echo "[INFO] CRDs applied successfully."
                  break
                fi

                if [ "$i" -eq "$retries" ]; then
                  echo "[ERROR] Failed applying CRDs after $retries attempts."
                  exit 1
                fi

                echo "[WARN] Apply failed (attempt $i/$retries). Retrying in ${delay}s..."
                sleep "$delay"
              done

              echo "[INFO] Waiting for CRDs to become Established..."

              kubectl wait --for=condition=Established --timeout=120s crd/virtualworkloads.kompass.zesty.co
              kubectl wait --for=condition=Established --timeout=120s crd/actions.rightsizing.kompass.zesty.co
              kubectl wait --for=condition=Established --timeout=120s crd/policies.rightsizing.kompass.zesty.co

              echo "[INFO] All CRDs are Established."
